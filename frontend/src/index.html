<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Prompt Library</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }
    nav {
      background: #0f172a;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .brand { color: #f8fafc; font-weight: 700; font-size: 1.1rem; text-decoration: none; margin-right: auto; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border-radius: 6px; transition: all 0.15s; }
    nav a:hover { background: #1e293b; color: #f8fafc; }
    nav a.active { background: #3b82f6; color: #fff; }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
