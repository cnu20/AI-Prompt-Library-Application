<div class="page">
  <div class="card">
    <h1>Add New Prompt</h1>
    <p class="subtitle">Fill in the details below to save a new AI image generation prompt.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="field">
        <label for="title">Title</label>
        <input id="title" formControlName="title" type="text" placeholder="e.g. Cyberpunk City at Night" />
        <span class="err" *ngIf="f['title'].touched && f['title'].errors?.['required']">Title is required.</span>
        <span class="err" *ngIf="f['title'].touched && f['title'].errors?.['minlength']">Title must be at least 3 characters.</span>
      </div>

      <div class="field">
        <label for="content">Prompt Content</label>
        <textarea id="content" formControlName="content" rows="6"
          placeholder="Describe the image you want to generate in detail..."></textarea>
        <span class="err" *ngIf="f['content'].touched && f['content'].errors?.['required']">Content is required.</span>
        <span class="err" *ngIf="f['content'].touched && f['content'].errors?.['minlength']">Content must be at least 20 characters.</span>
      </div>

      <div class="field">
        <label for="complexity">Complexity <span class="hint">(1 = simple, 10 = very complex)</span></label>
        <div class="complexity-row">
          <input id="complexity" formControlName="complexity" type="number" min="1" max="10" />
          <div class="complexity-scale">
            <span class="low">Simple</span>
            <span class="high">Complex</span>
          </div>
        </div>
        <span class="err" *ngIf="f['complexity'].touched && (f['complexity'].errors?.['min'] || f['complexity'].errors?.['max'] || f['complexity'].errors?.['required'])">
          Complexity must be a number between 1 and 10.
        </span>
      </div>

      <div *ngIf="serverError" class="server-error">{{ serverError }}</div>

      <div class="actions">
        <a routerLink="/prompts" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit" [disabled]="submitting">
          {{ submitting ? 'Saving…' : 'Save Prompt' }}
        </button>
      </div>

    </form>
  </div>
</div>
